name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check --config .code_quality/ruff.toml src/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check --config .code_quality/ruff.toml src/ tests/

      - name: Type check with mypy
        run: uv run mypy --config-file .code_quality/mypy.ini src/

      - name: Run tests
        run: uv run pytest --cov --cov-report xml:coverage.xml
