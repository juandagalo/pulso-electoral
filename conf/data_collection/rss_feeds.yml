# Colombian RSS Feeds for political news collection
# Each feed is from a major Colombian news outlet

# NOTE — RSS availability as of March 2026:
# Five of the eleven originally targeted Colombian news outlets still provide
# public RSS feeds. The following outlets have discontinued public RSS entirely
# and no working alternatives were found:
#
#   - El Espectador   (Colombia's oldest newspaper, independent editorial line)
#   - Semana          (major news magazine, historically center-right)
#   - Cambio Colombia (investigative journalism)
#   - Caracol Radio   (major radio network with online presence)
#   - Blu Radio       (second-largest radio network)
#
# This concentration of accessible sources is itself a finding relevant to
# the research: when major outlets close open data channels, independent
# monitoring of the media landscape becomes structurally harder. The
# project's multi-source approach (GDELT, ACLED, Reddit, RSS) exists
# precisely because no single channel provides complete coverage.

feeds:
  # El Tiempo — largest circulation newspaper in Colombia
  - name: "El Tiempo - Colombia"
    url: "https://www.eltiempo.com/rss/colombia.xml"
    category: "news"
    # STATUS: titulares.xml returned 404 as of 2026-03-22; replaced with colombia.xml
  - name: "El Tiempo - Politica"
    url: "https://www.eltiempo.com/rss/politica.xml"
    category: "politics"

  # La Silla Vacia — independent investigative journalism, political analysis
  - name: "La Silla Vacia"
    url: "https://www.lasillavacia.com/feed/"
    category: "analysis"
    # STATUS: /rss redirects to /feed/ which works; updated URL directly

  # Razon Publica — academic-oriented political analysis
  - name: "Razon Publica"
    url: "https://razonpublica.com/feed/"
    category: "analysis"

  # Pulzo — digital-native news aggregator
  - name: "Pulzo"
    url: "https://www.pulzo.com/rss/nacion"
    category: "digital"
    # STATUS: /rss returns 200 but 0 bytes; replaced with /rss/nacion

# Collection settings
settings:
  request_delay_seconds: 1.0
  max_articles_per_feed: 100
  timeout_seconds: 30
