# ACLED configuration for Colombian conflict and protest event data
# ACLED: Armed Conflict Location and Event Data
# Free for research/NGO use (registration required, 24-48h approval)

filters:
  country: "Colombia"
  iso: 100  # ISO numeric code (optional)

  # Event types to collect.
  # NOTE: "Strategic developments" is intentionally kept — it captures
  # political agreements, peace negotiations, and policy changes that are
  # directly relevant to electoral/civic space monitoring. Without keyword
  # filtering it would be noisy, but filter_mode: required ensures only
  # electoral/civic-space events pass through.
  event_types:
    - "Protests"
    - "Riots"
    - "Violence against civilians"
    - "Strategic developments"

  # Sub-event types of particular interest for civic space monitoring
  sub_event_types:
    - "Peaceful protest"
    - "Protest with intervention"
    - "Excessive force against protesters"
    - "Mob violence"
    - "Attack"
    - "Abduction/forced disappearance"

  # Additional fields of interest
  additional_fields:
    - "civilian_targeting"
    - "disorder_type"
    - "geo_precision"
    - "tags"

  # Actor types to track
  actor_types:
    - "Civilians"
    - "Protesters"
    - "Government"
    - "Military"
    - "Police"
    - "Social Leaders"

# Collection settings
settings:
  # ACLED updates weekly
  lookback_days: 30
  # API endpoint
  base_url: "https://acleddata.com/api/acled/read"
  token_url: "https://acleddata.com/oauth/token"
  # Maximum records per request
  limit: 5000

  # Post-filter mode: "required" means ALWAYS apply notes_keywords after fetching.
  # Without this filter, a 3-month Colombia query returns ~31,000 events — most of
  # which are narco-violence and armed group battles irrelevant to elections/civic space.
  # The keywords below reduce the result set to only electoral and civic space events.
  filter_mode: "required"

  # Keywords to match against ACLED event notes (case-insensitive, any match = keep).
  # Drawn from conf/keywords/election.yml and conf/keywords/civic_space.yml.
  # Kept focused at 25 terms — one hit is enough to flag an event as relevant.
  notes_keywords:
    # --- Electoral process ---
    - "elecciones"
    - "candidato"
    - "candidata"
    - "campana electoral"
    - "partido politico"
    - "votacion"
    - "Registraduria"
    - "congreso"
    - "debate presidencial"
    - "jornada electoral"

    # --- Social leaders & human rights defenders ---
    - "lider social"
    - "lideres sociales"
    - "defensor de derechos"
    - "defensor de derechos humanos"
    - "defensora de derechos humanos"
    - "asesinato de lideres"

    # --- Civic space & protest ---
    - "sociedad civil"
    - "protesta social"
    - "libertad de prensa"
    - "ESMAD"
    - "criminalizacion de la protesta"
    - "represion"
    - "uso excesivo de fuerza"

    # --- Press freedom ---
    - "periodista"
    - "periodistas amenazados"

# Fallback: If ACLED registration is pending, use GDELT protest events
fallback:
  use_gdelt_protest: true
  gdelt_event_codes:
    - "14"  # PROTEST
    - "145" # PROTEST_DEMONSTRATION
